---
layout: page
title: Home
permalink: /
---
<div class="home-content">
  {% for post in site.posts limit: 10 %}
    <div class="post-intro">
      <div class="header">
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      </div>
      <div class="desc">
        <p>{{ post.excerpt }}</p>
      </div>
      <div class="footer">
        发布于 {{ post.date | date: "%F %R" }}
      </div>
    </div>
  {% endfor %}
</div>
